<svg width="1200" height="60" viewBox="0 0 1200 60" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated divider">
  <defs>
    <linearGradient id="line-gradient" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8">
        <animate attributeName="stop-color" values="#38bdf8;#22c55e;#ec4899;#38bdf8" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#38bdf8;#22c55e;#7c3aed" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#7c3aed;#38bdf8;#ec4899" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="60" fill="transparent"/>
  <path d="M0 30 C180 5 260 55 420 30 C590 4 700 56 860 30 C1010 8 1110 50 1200 30" stroke="url(#line-gradient)" stroke-width="4" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="d" dur="8s" repeatCount="indefinite"
      values="M0 30 C180 5 260 55 420 30 C590 4 700 56 860 30 C1010 8 1110 50 1200 30;
              M0 30 C170 55 270 4 420 30 C580 56 710 5 860 30 C1015 52 1100 8 1200 30;
              M0 30 C180 5 260 55 420 30 C590 4 700 56 860 30 C1010 8 1110 50 1200 30"/>
  </path>
</svg>
