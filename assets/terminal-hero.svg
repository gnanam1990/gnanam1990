<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Terminal neofetch: KRATOS profile summary">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#010409"/>
      <stop offset="1" stop-color="#0b0f16"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39d353"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#39d353"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-300 0;300 0;-300 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screen"><rect x="24" y="24" width="1152" height="432" rx="14"/></clipPath>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;}
      .g{fill:#39d353;} .c{fill:#2dd4bf;} .a{fill:#e3b341;} .r{fill:#f85149;}
      .t{fill:#c9d1d9;} .m{fill:#8b949e;}
      .lbl{font-size:19px;font-weight:700;}
      .val{font-size:19px;}
      .hd{font-size:23px;font-weight:700;}
      .ttl{font-size:16px;}
      .row{opacity:0;animation:rise 14s ease-in-out infinite;}
      .r2{animation-delay:.45s} .r3{animation-delay:.9s} .r4{animation-delay:1.35s}
      .r5{animation-delay:1.8s} .r6{animation-delay:2.25s} .r7{animation-delay:2.7s}
      .r8{animation-delay:3.15s} .r9{animation-delay:3.6s}
      .cur{animation:blink 1s steps(2,start) infinite;}
      @keyframes rise{0%,2%{opacity:0;transform:translateY(6px)}7%,90%{opacity:1;transform:translateY(0)}97%,100%{opacity:0;transform:translateY(-6px)}}
      @keyframes blink{50%{opacity:0}}
    </style>
  </defs>

  <rect width="1200" height="480" rx="16" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="476" rx="15" fill="none" stroke="url(#frame)" stroke-width="2.5" opacity="0.85"/>
  <rect x="24" y="24" width="1152" height="432" rx="14" fill="#0d1117" stroke="#1f2933"/>

  <rect x="24" y="24" width="1152" height="46" rx="14" fill="#161b22"/>
  <rect x="24" y="52" width="1152" height="18" fill="#161b22"/>
  <circle cx="54" cy="47" r="7" fill="#f85149"/>
  <circle cx="80" cy="47" r="7" fill="#e3b341"/>
  <circle cx="106" cy="47" r="7" fill="#39d353"/>
  <text x="600" y="53" text-anchor="middle" class="mono m ttl">kratos@github: ~/profile — zsh</text>

  <g clip-path="url(#screen)">
    <rect x="24" y="70" width="1152" height="2" fill="#39d353" opacity="0.10">
      <animate attributeName="y" values="70;456;70" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g filter="url(#glow)">
    <rect x="70" y="150" width="190" height="190" rx="24" fill="#010409" stroke="#39d353" stroke-width="2"/>
    <text x="98" y="272" class="mono" font-size="88" font-weight="700"><tspan class="g">&gt;</tspan><tspan class="g cur">_</tspan></text>
  </g>

  <g class="mono">
    <g class="row"><text x="320" y="180" class="hd"><tspan class="g">kratos</tspan><tspan class="m">@</tspan><tspan class="g">github</tspan></text></g>
    <line x1="320" y1="196" x2="1140" y2="196" stroke="#1f2933" stroke-width="2"/>

    <g class="row r2"><text x="320" y="230" class="g lbl">OS</text><text x="486" y="230" class="t val">Onchain AI · Full-Stack Engineer</text></g>
    <g class="row r3"><text x="320" y="261" class="g lbl">Host</text><text x="486" y="261" class="t val">gitlawb · Zero (core developer)</text></g>
    <g class="row r4"><text x="320" y="292" class="g lbl">Languages</text><text x="486" y="292" class="t val">TypeScript · Python · Rust · Solidity · Go</text></g>
    <g class="row r5"><text x="320" y="323" class="g lbl">Uptime</text><text x="486" y="323" class="t val">since 2021 · 217 repos · 121 followers</text></g>
    <g class="row r6"><text x="320" y="354" class="g lbl">Shell</text><text x="486" y="354" class="t val">zsh + Zero · your model, your machine, your rules</text></g>
    <g class="row r7"><text x="320" y="385" class="g lbl">LOC·2026</text><text x="486" y="385" class="val"><tspan class="g">+2,141,596</tspan><tspan class="m"> / </tspan><tspan class="r">−119,501</tspan><tspan class="m">  ·  net </tspan><tspan class="c">+2,022,095</tspan></text></g>
    <g class="row r8"><text x="320" y="416" class="g lbl">Focus</text><text x="486" y="416" class="t val">agent payments · onchain infra · AI tooling</text></g>
  </g>

  <g class="row r9">
    <rect x="320" y="432" width="26" height="14" rx="3" fill="#39d353"/>
    <rect x="352" y="432" width="26" height="14" rx="3" fill="#2dd4bf"/>
    <rect x="384" y="432" width="26" height="14" rx="3" fill="#e3b341"/>
    <rect x="416" y="432" width="26" height="14" rx="3" fill="#f85149"/>
    <rect x="448" y="432" width="26" height="14" rx="3" fill="#58a6ff"/>
    <rect x="480" y="432" width="26" height="14" rx="3" fill="#a78bfa"/>
    <rect x="512" y="432" width="26" height="14" rx="3" fill="#c9d1d9"/>
  </g>
</svg>
