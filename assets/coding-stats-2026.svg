<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="2026 coding stats: 1.93 million lines added">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f766e"/>
      <stop offset="0.45" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#ec4899"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-200 0;200 0;-200 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="glow-green" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-pink" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#ec4899" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ec4899" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow-cyan" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 15px; fill: #94a3b8; letter-spacing: 1.5px; }
      .value { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 42px; font-weight: 700; }
      .title { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 18px; font-weight: 700; fill: #e2e8f0; letter-spacing: 2px; }
      .sub { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; fill: #64748b; }
      .green { fill: #22c55e; }
      .pink { fill: #ec4899; }
      .cyan { fill: #38bdf8; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      @keyframes pulse {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="280" rx="24" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="1197" height="277" rx="22.5" stroke="url(#border)" stroke-width="3" fill="none" opacity="0.95"/>

  <!-- header -->
  <circle cx="42" cy="38" r="6" fill="#22c55e" filter="url(#soft)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="60" y="44" class="title">2026 · LINES OF CODE</text>
  <text x="980" y="44" class="sub">owned repos · incl. private</text>

  <!-- card 1: added -->
  <rect x="36" y="72" width="360" height="168" rx="18" fill="#020617" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="36" y="72" width="360" height="168" rx="18" fill="url(#glow-green)"/>
  <text x="60" y="112" class="label">LINES ADDED</text>
  <text x="60" y="175" class="value green pulse">1,933,266</text>
  <text x="60" y="210" class="sub">+1.93M this year</text>

  <!-- card 2: deleted -->
  <rect x="420" y="72" width="360" height="168" rx="18" fill="#020617" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="420" y="72" width="360" height="168" rx="18" fill="url(#glow-pink)"/>
  <text x="444" y="112" class="label">LINES DELETED</text>
  <text x="444" y="175" class="value pink pulse">111,830</text>
  <text x="444" y="210" class="sub">cleanup &amp; refactors</text>

  <!-- card 3: net -->
  <rect x="804" y="72" width="360" height="168" rx="18" fill="#020617" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="804" y="72" width="360" height="168" rx="18" fill="url(#glow-cyan)"/>
  <text x="828" y="112" class="label">NET CHANGE</text>
  <text x="828" y="175" class="value cyan pulse">+1,821,436</text>
  <text x="828" y="210" class="sub">148 active repos</text>
</svg>
